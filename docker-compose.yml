services:
  fashionhub:
    image: pocketaces2/fashionhub-demo-app:latest
    platform: linux/arm64
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/fashionhub/"]
      interval: 5s
      timeout: 3s
      retries: 5

  tests:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      TEST_ENV: docker
      BROWSER: ${BROWSER:-}
    depends_on:
      fashionhub:
        condition: service_healthy
    volumes:
      - ./allure-results:/app/allure-results
      - ./playwright-report:/app/playwright-report