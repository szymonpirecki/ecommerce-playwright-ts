name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Local (Docker)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Create users.json from secret
        run: echo '${{ secrets.USERS_JSON }}' > src/test-data/users.json

      - name: Run tests
        run: docker compose up --build --exit-code-from tests

      - name: Tear down
        if: always()
        run: docker compose down

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-docker
          path: allure-results/
          retention-days: 14

  browser-matrix:
    name: Production (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Create users.json
        run: echo "$USERS_JSON" > src/test-data/users.json
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          TEST_ENV: production

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 14

  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [docker, browser-matrix]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-all/
          merge-multiple: true

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v2
        if: always()
        with:
          allure_results: allure-results-all
          allure_history: allure-history
          keep_reports: 20
          gh_pages: gh-pages

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history