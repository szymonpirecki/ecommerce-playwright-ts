name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Docker (local env)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Create users.json from secret
        run: echo '${{ secrets.USERS_JSON }}' > src/test-data/users.json

      - name: Run tests
        run: docker compose up --build --exit-code-from tests

      - name: Tear down
        if: always()
        run: docker compose down

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-docker
          path: allure-results/
          retention-days: 14

  browser-matrix:
    name: E2E (${{ matrix.browser }}, production)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Create users.json
        run: echo "$USERS_JSON" > src/test-data/users.json
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          TEST_ENV: production

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 14
