name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-matrix:
    name: Local Docker (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Create users.json from secret
        run: echo '${{ secrets.USERS_JSON }}' > src/test-data/users.json

      - name: Run tests
        run: BROWSER=${{ matrix.browser }} docker compose up --build --exit-code-from tests

      - name: Tear down
        if: always()
        run: docker compose down

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-docker-${{ matrix.browser }}
          path: allure-results/
          retention-days: 14

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces-docker-${{ matrix.browser }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  browser-matrix:
    name: Production (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Create users.json
        run: echo "$USERS_JSON" > src/test-data/users.json
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          TEST_ENV: production

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 14

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces-production-${{ matrix.browser }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  publish-reports:
    name: Publish Reports
    runs-on: ubuntu-latest
    needs: [docker-matrix, browser-matrix]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-raw/

      - name: Merge Allure results
        run: |
          mkdir -p allure-results-all
          find allure-results-raw -type f | while read -r f; do
            cp "$f" "allure-results-all/$(basename "$f")"
          done

      - name: Get previous gh-pages
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Copy history from previous report
        run: |
          if [ -d "gh-pages/last-history" ]; then
            cp -r gh-pages/last-history allure-results-all/history
          fi

      - name: Generate Allure report
        run: allure generate allure-results-all --clean -o gh-pages-out

      - name: Save history for next run
        run: cp -r gh-pages-out/history gh-pages-out/last-history

      - name: Download all traces
        uses: actions/download-artifact@v4
        with:
          pattern: traces-*
          path: traces-all/
        continue-on-error: true

      - name: Copy traces to output and generate index
        run: bash scripts/generate-trace-index.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-out

      - name: Post report links to summary
        if: always()
        run: |
          echo "## 📊 Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Report | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Allure | [Open](https://szymonpirecki.github.io/ecommerce-playwright-ts/) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎬 Traces | [Open](https://szymonpirecki.github.io/ecommerce-playwright-ts/traces/) |" >> $GITHUB_STEP_SUMMARY