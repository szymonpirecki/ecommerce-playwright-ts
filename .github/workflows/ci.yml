name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-matrix:
    name: Local Docker (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Create users.json from secret
        run: echo '${{ secrets.USERS_JSON }}' > src/test-data/users.json

      - name: Run tests
        run: BROWSER=${{ matrix.browser }} docker compose up --build --exit-code-from tests

      - name: Tear down
        if: always()
        run: docker compose down

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-docker-${{ matrix.browser }}
          path: allure-results/
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-docker-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

  browser-matrix:
    name: Production (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Create users.json
        run: echo "$USERS_JSON" > src/test-data/users.json
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          TEST_ENV: production

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 14

  publish-reports:
    name: Publish Reports
    runs-on: ubuntu-latest
    needs: [docker-matrix, browser-matrix]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-all/
          merge-multiple: true

      - name: Download Playwright reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          path: playwright-reports-all/

      - name: Get previous gh-pages
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Copy history from previous report
        run: |
          if [ -d "gh-pages/last-history" ]; then
            cp -r gh-pages/last-history allure-results-all/history
          fi

      - name: Generate Allure report
        run: allure generate allure-results-all --clean -o gh-pages-out

      - name: Save history for next run
        run: cp -r gh-pages-out/history gh-pages-out/last-history

      - name: Copy Playwright reports into output
        run: |
          mkdir -p gh-pages-out/playwright
          for dir in playwright-reports-all/playwright-report-*/; do
            name=$(basename "$dir" | sed 's/playwright-report-//')
            cp -r "$dir" "gh-pages-out/playwright/$name"
          done
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-out

      - name: Post report links to summary
        if: always()
        run: |
          echo "## 📊 Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Report | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Allure (all) | [Open](https://szymonpirecki.github.io/ecommerce-playwright-ts/) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 Production Chromium | [Open](https://szymonpirecki.github.io/ecommerce-playwright-ts/playwright/chromium/) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 Production Firefox | [Open](https://szymonpirecki.github.io/ecommerce-playwright-ts/playwright/firefox/) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 Production WebKit | [Open](https://szymonpirecki.github.io/ecommerce-playwright-ts/playwright/webkit/) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Chromium | [Open](https://szymonpirecki.github.io/ecommerce-playwright-ts/playwright/docker-chromium/) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Firefox | [Open](https://szymonpirecki.github.io/ecommerce-playwright-ts/playwright/docker-firefox/) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker WebKit | [Open](https://szymonpirecki.github.io/ecommerce-playwright-ts/playwright/docker-webkit/) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🗂️ [All reports index](https://szymonpirecki.github.io/ecommerce-playwright-ts/reports.html)" >> $GITHUB_STEP_SUMMARY